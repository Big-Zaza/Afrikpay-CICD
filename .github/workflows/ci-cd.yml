# Pipeline CI/CD - Zero to Deploy
# Se déclenche à chaque push sur master
name: CI/CD Pipeline
on:
  push:
    branches: [master]
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}
jobs:
  # -------------------------------------------------------
  # 1. Build & Test
  #    Compilation du code Java et exécution des tests
  # -------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Compilation et tests unitaires
        run: mvn clean verify -B
  # -------------------------------------------------------
  # 2. Analyse de code
  #    Scan de vulnérabilités du code et des dépendances
  # -------------------------------------------------------
  analyse-code:
    name: Analyse de code
    runs-on: ubuntu-latest
    needs: build-test
    outputs:
      trivy-summary: ${{ steps.trivy-report.outputs.summary }}
      trivy-cve-list: ${{ steps.trivy-report.outputs.cve_list }}
      snyk-summary: ${{ steps.snyk-report.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan des fichiers sources (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "json"
          output: trivy-results.json

      - name: Résumé Trivy
        id: trivy-report
        if: always()
        run: |
          if [ -f trivy-results.json ] && [ -s trivy-results.json ]; then
            python3 -c "
          import json, os
          data = json.load(open('trivy-results.json'))
          vulns = []
          for r in data.get('Results', []):
            for v in (r.get('Vulnerabilities') or []):
              vulns.append((v.get('Severity',''), v.get('VulnerabilityID',''), v.get('PkgName','').replace('\"','')))
          crit = [v for v in vulns if v[0]=='CRITICAL']
          high = [v for v in vulns if v[0]=='HIGH']
          summary = str(len(crit)) + ' critiques, ' + str(len(high)) + ' hautes'
          lines = ['  · ' + c + ' [' + s + '] ' + p for s,c,p in (crit+high)[:5]]
          cve_list = (chr(92)+'n').join(lines) if lines else '  Aucune vulnerabilite detectee'
          if len(crit+high) > 5:
            cve_list += (chr(92)+'n') + '  ... et ' + str(len(crit+high)-5) + ' autres'
          open(os.environ['GITHUB_OUTPUT'], 'a').write('summary=' + summary + chr(10) + 'cve_list=' + cve_list + chr(10))
          "
          else
            echo "summary=Aucune vulnérabilité détectée" >> $GITHUB_OUTPUT
            echo "cve_list=  Aucune vulnérabilité détectée" >> $GITHUB_OUTPUT
          fi

      - name: Scan des dépendances (Snyk)
        id: snyk-scan
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      - name: Résumé Snyk
        id: snyk-report
        if: always()
        run: |
          if [ -f snyk-results.json ]; then
            TOTAL=$(cat snyk-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('uniqueCount',len(d.get('vulnerabilities',[]))))" 2>/dev/null || echo "?")
            echo "summary=${TOTAL} vulnérabilités trouvées" >> $GITHUB_OUTPUT
          else
            echo "summary=Aucune vulnérabilité détectée" >> $GITHUB_OUTPUT
          fi
  # -------------------------------------------------------
  # 3. Dockerisation
  #    Création de l'image Docker optimisée (multi-stage)
  # -------------------------------------------------------
  dockerisation:
    name: Dockerisation
    runs-on: ubuntu-latest
    needs: analyse-code
    outputs:
      snyk-docker-summary: ${{ steps.snyk-docker-report.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .
      - name: Scan de l'image Docker (Snyk)
        id: snyk-docker-scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          args: --severity-threshold=high --json-file-output=snyk-docker-results.json
      - name: Résumé Snyk Docker
        id: snyk-docker-report
        if: always()
        run: |
          if [ -f snyk-docker-results.json ]; then
            TOTAL=$(python3 -c "
          import sys,json
          data=json.load(open('snyk-docker-results.json'))
          if isinstance(data, list):
            total=sum(len(d.get('vulnerabilities',[])) for d in data)
          else:
            total=len(data.get('vulnerabilities',[]))
          print(total)" 2>/dev/null || echo "?")
            echo "summary=${TOTAL} vulnérabilités dans l'image" >> $GITHUB_OUTPUT
          else
            echo "summary=Aucune vulnérabilité détectée" >> $GITHUB_OUTPUT
          fi
      - name: Sauvegarder l'image pour le job suivant
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz
      - name: Upload de l'image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1
  # -------------------------------------------------------
  # 4. Registry
  #    Push de l'image sur Docker Hub
  # -------------------------------------------------------
  registry:
    name: Registry
    runs-on: ubuntu-latest
    needs: dockerisation
    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Charger l'image Docker
        run: gunzip -c image.tar.gz | docker load
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push de l'image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
  # -------------------------------------------------------
  # 5. Déploiement (Continuous Deployment)
  #    Connexion SSH au VPS, pull, arrêt, relance via docker compose
  # -------------------------------------------------------
  deploiement:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: registry
    steps:
      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
  # -------------------------------------------------------
  # 6. Notification
  #    Envoi du statut de chaque étape sur Slack
  # -------------------------------------------------------
  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build-test, analyse-code, dockerisation, registry, deploiement]
    if: always()
    steps:
      - name: Envoyer le statut sur Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *CI/CD Pipeline* — <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
                  }
                },
                { "type": "divider" },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.build-test.result == 'success' && ':large_green_circle:' || needs.build-test.result == 'skipped' && ':white_circle:' || ':red_circle:' }}  *Build & Test*\n${{ needs.analyse-code.result == 'success' && ':large_green_circle:' || needs.analyse-code.result == 'skipped' && ':white_circle:' || ':red_circle:' }}  *Analyse de code*\n${{ needs.dockerisation.result == 'success' && ':large_green_circle:' || needs.dockerisation.result == 'skipped' && ':white_circle:' || ':red_circle:' }}  *Dockerisation*\n${{ needs.registry.result == 'success' && ':large_green_circle:' || needs.registry.result == 'skipped' && ':white_circle:' || ':red_circle:' }}  *Registry*\n${{ needs.deploiement.result == 'success' && ':large_green_circle:' || needs.deploiement.result == 'skipped' && ':white_circle:' || ':red_circle:' }}  *Déploiement*"
                  }
                },
                { "type": "divider" },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Report*\n\n:shield: *Trivy* — ${{ needs.analyse-code.outputs.trivy-summary }}\n${{ needs.analyse-code.outputs.trivy-cve-list }}\n\n:mag: *Snyk (code)* — ${{ needs.analyse-code.outputs.snyk-summary }}\n:mag: *Snyk (image)* — ${{ needs.dockerisation.outputs.snyk-docker-summary }}"
                  }
                },
                { "type": "divider" },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": ":pushpin: `${{ github.sha }}` · :bust_in_silhouette: ${{ github.actor }} · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
