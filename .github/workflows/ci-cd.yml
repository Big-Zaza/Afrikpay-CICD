# Pipeline CI/CD - Zero to Deploy
# Se déclenche à chaque push sur master
name: CI/CD Pipeline
on:
  push:
    branches: [master]
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}
jobs:
  # -------------------------------------------------------
  # 1. Build & Test
  #    Compilation du code Java et exécution des tests
  # -------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Compilation et tests unitaires
        run: mvn clean verify -B
  # -------------------------------------------------------
  # 2. Analyse de code
  #    Scan de vulnérabilités du code et des dépendances
  # -------------------------------------------------------
  analyse-code:
    name: Analyse de code
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Scan des fichiers sources (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
      - name: Scan des dépendances (Snyk)
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
  # -------------------------------------------------------
  # 3. Dockerisation
  #    Création de l'image Docker optimisée (multi-stage)
  # -------------------------------------------------------
  dockerisation:
    name: Dockerisation
    runs-on: ubuntu-latest
    needs: analyse-code
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .
      - name: Scan de l'image Docker (Snyk)
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          args: --severity-threshold=high
      - name: Sauvegarder l'image pour le job suivant
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz
      - name: Upload de l'image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1
  # -------------------------------------------------------
  # 4. Registry
  #    Push de l'image sur Docker Hub
  # -------------------------------------------------------
  registry:
    name: Registry
    runs-on: ubuntu-latest
    needs: dockerisation
    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Charger l'image Docker
        run: gunzip -c image.tar.gz | docker load
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push de l'image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
  # -------------------------------------------------------
  # 5. Déploiement (Continuous Deployment)
  #    Connexion SSH au VPS, pull, arrêt, relance via docker compose
  # -------------------------------------------------------
  deploiement:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: registry
    steps:
      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
  # -------------------------------------------------------
  # 6. Notification
  #    Envoi du statut de chaque étape sur Slack
  # -------------------------------------------------------
  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build-test, analyse-code, dockerisation, registry, deploiement]
    if: always()
    steps:
      - name: Envoyer le statut sur Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Pipeline CI/CD — `${{ github.repository }}`\n\n• Build & Test : ${{ needs.build-test.result }}\n• Analyse de code : ${{ needs.analyse-code.result }}\n• Dockerisation : ${{ needs.dockerisation.result }}\n• Registry : ${{ needs.registry.result }}\n• Déploiement : ${{ needs.deploiement.result }}\n\nCommit : `${{ github.sha }}`\nAuteur : ${{ github.actor }}\nDétails : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
